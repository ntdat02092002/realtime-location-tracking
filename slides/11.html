<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sequence Diagram - Order Flow</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Inter", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    position: relative;
    background-color: #fff;
    overflow: hidden;
    display: flex;
    flex-direction: column
    }
.text-primary-blue { color: #0066CC }
.text-light-blue { color: #4A90E2 }
.text-primary-green { color: #00B894 }
.text-accent-orange { color: #FF8C42 }
.text-dark-blue { color: #003366 }
.bg-primary-blue { background-color: #0066CC }
.bg-primary-green { background-color: #00B894 }
.bg-accent-orange { background-color: #FF8C42 }
.bg-blue-50 { background-color: #eff6ff }
.bg-green-50 { background-color: #f0fdf4 }
.bg-orange-50 { background-color: #fff7ed }
.bg-grid-pattern {
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.3
    }
</style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div class="absolute inset-0 bg-grid-pattern z-0"></div>
<div class="absolute top-0 right-0 w-96 h-96 bg-green-50 rounded-bl-full opacity-40 z-0"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-orange-50 rounded-tr-full opacity-40 z-0"></div>

<!-- Header -->
<div class="relative z-10 px-16 pt-10 pb-4" style="flex-shrink: 0">
<div class="flex items-center gap-4 mb-2">
<div class="h-1 w-12 bg-primary-green"></div>
<h2 class="text-sm font-bold tracking-widest text-gray-400 uppercase">BIỂU ĐỒ SEQUENCE</h2>
</div>
<h1 class="text-4xl font-extrabold text-dark-blue">
Order Flow <span class="text-primary-green">(Quy trình đặt đơn)</span>
</h1>
<p class="text-base text-gray-500 mt-2 max-w-3xl">
Quy trình xử lý đơn hàng từ lúc khách hàng đặt đến khi tài xế chấp nhận
</p>
</div>

<!-- Image Container -->
<div class="relative z-20 px-16 pb-8 flex-1 flex items-center justify-center">
<div class="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
<img src="../docs/diagrams/sequence_order_flow.png" alt="Sequence Diagram - Order Flow" class="max-w-full object-contain" style="height: 480px;"/>
</div>
</div>

</div>
</body>
</html>
