<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Phần 2: Phân tích yêu cầu - Hệ thống theo dõi giao hàng</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Inter", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    position: relative;
    background-color: #fff;
    overflow: hidden;
    display: flex;
    flex-direction: column
    }
.text-primary-blue {
    color: #0066CC
    }
.text-light-blue {
    color: #4A90E2
    }
.text-primary-green {
    color: #00B894
    }
.text-accent-orange {
    color: #FF8C42
    }
.text-dark-blue {
    color: #003366
    }
.bg-primary-blue {
    background-color: #0066CC
    }
.bg-primary-green {
    background-color: #00B894
    }
.bg-accent-orange {
    background-color: #FF8C42
    }
.bg-blue-50 {
    background-color: #eff6ff
    }
.bg-green-50 {
    background-color: #f0fdf4
    }
.bg-orange-50 {
    background-color: #fff7ed
    }
.bg-dots {
    background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    opacity: 0.3
    }</style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div class="absolute inset-0 bg-dots z-0"></div>
<div class="absolute top-0 right-0 w-1/3 h-full bg-blue-50 opacity-20 transform skew-x-12 translate-x-20 z-0"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-green-50 rounded-full blur-3xl opacity-40 z-0"></div>

<!-- Header -->
<div class="relative z-10 px-16 pt-10 pb-6" style="flex-shrink: 0">
<div class="flex items-center gap-4 mb-2">
<div class="h-1 w-12 bg-accent-orange"></div>
<h2 class="text-sm font-bold tracking-widest text-accent-orange uppercase">PHẦN 2: PHÂN TÍCH YÊU CẦU</h2>
</div>
<h1 class="text-4xl font-extrabold text-dark-blue">
Phân tích <span class="text-accent-orange">Yêu cầu</span>
</h1>
<p class="text-lg text-gray-500 mt-2 max-w-2xl">
Xác định stakeholders, yêu cầu nghiệp vụ và đặc điểm dữ liệu
</p>
</div>

<!-- Main Content -->
<div class="relative z-10 px-16 pb-12 flex-1 flex items-center justify-center">
<div class="text-center max-w-3xl">
<div class="inline-flex items-center gap-3 bg-accent-orange px-5 py-2 rounded-full mb-8">
<span class="text-sm font-semibold text-white">PHẦN 2: PHÂN TÍCH YÊU CẦU</span>
</div>
<h2 class="text-6xl font-extrabold text-dark-blue mb-6">
Phân tích<br/>
<span class="text-accent-orange">Yêu cầu</span> nghiệp vụ
</h2>
<div class="flex items-center justify-center gap-2 text-lg text-gray-500 mb-8">
<i class="fas fa-clipboard-list text-primary-green"></i>
<span>Xác định stakeholders, ERD, Use cases</span>
</div>
<div class="flex items-center justify-center gap-6 mt-8">
<div class="flex items-center gap-2 text-sm text-gray-400">
<i class="fas fa-users text-primary-blue"></i>
<span>3 Stakeholders</span>
</div>
<div class="w-1 h-1 bg-gray-300 rounded-full"></div>
<div class="flex items-center gap-2 text-sm text-gray-400">
<i class="fas fa-database text-primary-green"></i>
<span>Data characteristics</span>
</div>
<div class="w-1 h-1 bg-gray-300 rounded-full"></div>
<div class="flex items-center gap-2 text-sm text-gray-400">
<i class="fas fa-tasks text-accent-orange"></i>
<span>8 Requirements</span>
</div>
</div>
</div>
</div>
</body>
</html>
